<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Aadim Vault</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        body {
            font-family: 'Poppins', 'Noto Sans Bengali', sans-serif;
        }
        .profile-container {
            max-width: 700px;
            margin: auto;
            padding: 20px;
        }
        .section-card {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }
        .section-card h3 {
            margin-bottom: 16px;
            font-size: 1.1rem;
            color: var(--gold);
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }
        .info-row {
            display: flex;
            flex-direction: column;
            margin-bottom: 12px;
        }
        .info-row label {
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--text-secondary, #666);
            margin-bottom: 4px;
        }
        .info-row input, .info-row textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
            resize: vertical;
        }
        .save-btn {
            background: var(--gold);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 24px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        .profile-pic-wrapper {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        .profile-pic {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--gold);
        }
        .activity-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        .activity-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>

    <!-- ====== HEADER ====== -->
    <header class="navbar">
        <div class="logo">
            <div class="logo-circle">AV</div>
            <div>
                <h2>Aadim Vault</h2>
            </div>
        </div>
        <nav>
            <a href="index.html"><i class="fas fa-home"></i> Home</a>
        </nav>
    </header>

    <!-- ====== PROFILE CONTENT ====== -->
    <div class="profile-container">

        <!-- প্রোফাইল হেডার -->
        <div class="section-card">
            <div class="profile-pic-wrapper">
                <img src="https://via.placeholder.com/80" alt="Profile" class="profile-pic" id="displayPic">
                <div>
                    <h2 id="displayName">Loading...</h2>
                    <p style="color: var(--text-secondary, #666);" id="displayEmail"></p>
                </div>
            </div>
        </div>

        <!-- এডিট প্রোফাইল -->
        <div class="section-card">
            <h3><i class="fas fa-user-edit"></i> Edit Profile</h3>
            <div class="info-row">
                <label>Full Name</label>
                <input type="text" id="editName" placeholder="Your full name">
            </div>
            <div class="info-row">
                <label>Bio</label>
                <textarea id="editBio" rows="3" placeholder="Tell us about yourself..."></textarea>
            </div>
            <div class="info-row">
                <label>Profile Picture URL</label>
                <input type="text" id="editPic" placeholder="https://...">
            </div>
            <button class="save-btn" id="saveProfileBtn"><i class="fas fa-save"></i> Save Changes</button>
            <p id="profileMsg" style="margin-top:8px; font-size:0.9rem;"></p>
        </div>

        <!-- মাই আইটেমস -->
        <div class="section-card">
            <h3><i class="fas fa-box"></i> My Items</h3>
            <div id="myItemsList">
                <p style="color: var(--text-secondary, #666);">No items uploaded yet.</p>
            </div>
        </div>

        <!-- ওয়ান বিডস -->
        <div class="section-card">
            <h3><i class="fas fa-gavel"></i> Won Bids</h3>
            <div id="wonBidsList">
                <p style="color: var(--text-secondary, #666);">No bids won yet.</p>
            </div>
        </div>

        <!-- মাই স্টোরিজ -->
        <div class="section-card">
            <h3><i class="fas fa-feather"></i> My Stories</h3>
            <div id="myStoriesList">
                <p style="color: var(--text-secondary, #666);">No stories written yet.</p>
            </div>
        </div>

        <!-- লগআউট -->
        <div style="text-align: center; margin: 20px 0;">
            <button id="logoutBtn" style="background: #c0392b; color: white; border: none; padding: 12px 28px; border-radius: 24px; font-weight: 600; cursor: pointer;">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </div>

    <!-- ====== SCRIPTS ====== -->
    <script src="js/auth.js"></script>
    <script>
        // ---------- অ্যাক্সেস চেক ----------
        if (!Auth.isLoggedIn()) {
            alert('Please login first.');
            window.location.href = 'login.html';
        }

        const currentUser = Auth.getUser();

        // ---------- ডিসপ্লে আপডেট ----------
        document.getElementById('displayName').textContent = currentUser.name || 'User';
        document.getElementById('displayEmail').textContent = currentUser.email || '';
        document.getElementById('editName').value = currentUser.name || '';
        document.getElementById('editBio').value = currentUser.bio || '';
        document.getElementById('editPic').value = currentUser.pic || '';
        if (currentUser.pic) {
            document.getElementById('displayPic').src = currentUser.pic;
        }

        // ---------- সেভ প্রোফাইল ----------
        document.getElementById('saveProfileBtn').addEventListener('click', () => {
            const newName = document.getElementById('editName').value.trim();
            const newBio = document.getElementById('editBio').value.trim();
            const newPic = document.getElementById('editPic').value.trim();

            currentUser.name = newName;
            currentUser.bio = newBio;
            currentUser.pic = newPic;
            Auth.saveAuth(Auth.getToken(), currentUser);

            document.getElementById('displayName').textContent = newName || 'User';
            document.getElementById('displayEmail').textContent = currentUser.email;
            if (newPic) {
                document.getElementById('displayPic').src = newPic;
            }

            document.getElementById('profileMsg').innerHTML = '<span style="color: green;">✅ Profile updated!</span>';
            setTimeout(() => { document.getElementById('profileMsg').textContent = ''; }, 2500);
        });

        // ---------- লগআউট ----------
        document.getElementById('logoutBtn').addEventListener('click', () => {
            Auth.logout();
        });
    </script>
</body>
</html>
