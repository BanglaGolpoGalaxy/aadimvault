<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Aadim Vault</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .profile-container { max-width: 600px; margin: auto; padding: 20px; }
        .section-card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 16px; border: 1px solid var(--border); }
        .section-card h3 { margin-bottom: 16px; font-size: 1.1rem; color: var(--gold); border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        .info-row { display: flex; flex-direction: column; margin-bottom: 14px; }
        .info-row label { font-weight: 600; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 4px; }
        .info-row input, .info-row textarea {
            width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border);
            background: var(--bg); color: var(--text); font-family: inherit; resize: vertical;
        }
        .save-btn { background: var(--gold); color: white; border: none; padding: 10px 24px; border-radius: 24px; font-weight: 600; cursor: pointer; margin-top: 8px; }
        .profile-pic-wrapper { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
        .profile-pic { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid var(--gold); }
        .file-label { display: inline-block; background: var(--gold); color: white; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; }
        .activity-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .activity-item:last-child { border-bottom: none; }
        @media (max-width: 480px) {
            .profile-pic-wrapper { flex-direction: column; align-items: flex-start; }
            .info-row input, .info-row textarea { font-size: 0.9rem; overflow-wrap: break-word; word-break: break-all; }
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <div class="logo-circle">AV</div>
            <div><h2>Aadim Vault</h2></div>
        </div>
        <nav>
            <a href="index.html"><i class="fas fa-home"></i> Home</a>
        </nav>
    </header>

    <div class="profile-container">
        <div class="section-card">
            <div class="profile-pic-wrapper">
                <img src="https://via.placeholder.com/80" alt="Profile" class="profile-pic" id="displayPic">
                <div>
                    <h2 id="displayName">Loading...</h2>
                    <p id="displayEmail" style="word-break: break-all;"></p>
                </div>
            </div>
        </div>

        <div class="section-card">
            <h3><i class="fas fa-user-edit"></i> Edit Profile</h3>
            <div class="info-row"><label>Full Name</label><input type="text" id="editName" placeholder="Your full name"></div>
            <div class="info-row"><label>Bio</label><textarea id="editBio" rows="3" placeholder="Tell us about yourself..."></textarea></div>
            <div class="info-row">
                <label>Profile Picture</label>
                <input type="file" id="profilePicFile" accept="image/*" style="display:none;" onchange="previewProfilePic(event)">
                <label class="file-label" for="profilePicFile"><i class="fas fa-camera"></i> Choose from Gallery / Camera</label>
            </div>
            <button class="save-btn" id="saveProfileBtn"><i class="fas fa-save"></i> Save Changes</button>
            <p id="profileMsg" style="margin-top:8px; font-size:0.9rem;"></p>
        </div>

        <div class="section-card">
            <h3><i class="fas fa-box"></i> My Items</h3>
            <div id="myItemsList"><p style="color: var(--text-secondary);">No items uploaded yet.</p></div>
        </div>

        <div class="section-card">
            <h3><i class="fas fa-gavel"></i> Won Bids</h3>
            <div id="wonBidsList"><p style="color: var(--text-secondary);">No bids won yet.</p></div>
        </div>

        <div class="section-card">
            <h3><i class="fas fa-feather"></i> My Stories</h3>
            <div id="myStoriesList"><p style="color: var(--text-secondary);">No stories written yet.</p></div>
        </div>

        <div style="text-align: center; margin: 20px 0;">
            <button id="logoutBtn" style="background: #c0392b; color: white; border: none; padding: 12px 28px; border-radius: 24px; font-weight: 600; cursor: pointer;">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        if (!Auth.isLoggedIn()) { alert('Please login first.'); window.location.href = 'login.html'; }
        const currentUser = Auth.getUser();
        document.getElementById('displayName').textContent = currentUser.name || 'User';
        document.getElementById('displayEmail').textContent = currentUser.email || '';
        document.getElementById('editName').value = currentUser.name || '';
        document.getElementById('editBio').value = currentUser.bio || '';
        if (currentUser.pic) { document.getElementById('displayPic').src = currentUser.pic; }

        function previewProfilePic(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('displayPic').src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        document.getElementById('saveProfileBtn').addEventListener('click', () => {
            const newName = document.getElementById('editName').value.trim();
            const newBio = document.getElementById('editBio').value.trim();
            currentUser.name = newName;
            currentUser.bio = newBio;
            const picFile = document.getElementById('profilePicFile').files[0];
            if (picFile) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentUser.pic = e.target.result;
                    Auth.saveAuth(Auth.getToken(), currentUser);
                };
                reader.readAsDataURL(picFile);
            }
            Auth.saveAuth(Auth.getToken(), currentUser);
            document.getElementById('displayName').textContent = newName || 'User';
            document.getElementById('profileMsg').innerHTML = '<span style="color: green;">Profile updated!</span>';
            setTimeout(() => { document.getElementById('profileMsg').textContent = ''; }, 2500);
        });

        document.getElementById('logoutBtn').addEventListener('click', () => { Auth.logout(); });
    </script>
</body>
</html>
