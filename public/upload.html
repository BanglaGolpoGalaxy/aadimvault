<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Item | Aadim Vault</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .upload-container { max-width: 600px; margin: 30px auto; padding: 20px; }
        .form-card { background: var(--card); padding: 24px; border-radius: 20px; border: 1px solid var(--border); }
        .form-card h2 { margin-bottom: 20px; color: var(--gold); }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 0.9rem; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 10px 14px; border-radius: 12px; border: 1px solid var(--border);
            background: var(--bg); color: var(--text); font-family: inherit;
        }
        .file-label { display: inline-block; background: var(--gold); color: white; padding: 8px 18px; border-radius: 20px; cursor: pointer; }
        .file-names { font-size: 0.8rem; color: var(--text-secondary); margin-top: 4px; }
        .submit-btn { background: var(--gold); color: white; border: none; padding: 12px 24px; border-radius: 24px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 12px; }
        #auction-settings { display: none; background: var(--bg); padding: 12px; border-radius: 12px; margin-top: 8px; }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <div class="logo-circle">AV</div>
            <div><h2>Aadim Vault</h2></div>
        </div>
        <nav>
            <a href="index.html"><i class="fas fa-home"></i> Home</a>
        </nav>
    </header>

    <div class="upload-container">
        <div class="form-card">
            <h2>Add New Item</h2>
            <form id="product-form" enctype="multipart/form-data">
                <div class="form-group"><label>Product Name *</label><input type="text" name="title" placeholder="e.g., Ancient Bronze Statue" required></div>
                <div class="form-group"><label>Short Description</label><textarea name="description" rows="2" placeholder="Briefly describe..."></textarea></div>
                <div class="form-group"><label>Price (₹)</label><input type="number" name="price" step="0.01" placeholder="25000"></div>
                <div class="form-group"><label>Category</label><select name="category">
                    <option value="other">Other</option>
                    <option value="Statue">Statue</option>
                    <option value="Coin">Coin</option>
                    <option value="Manuscript">Manuscript</option>
                    <option value="Mask">Mask</option>
                    <option value="Weapon">Weapon</option>
                    <option value="Book">Book</option>
                    <option value="Jewelry">Jewelry</option>
                    <option value="Pottery">Pottery</option>
                    <option value="Watch">Watch</option>
                </select></div>
                <div class="form-group">
                    <label>Images (up to 5)</label>
                    <label class="file-label" for="images"><i class="fas fa-images"></i> Select Images</label>
                    <input type="file" name="images" id="images" accept="image/*" multiple style="display:none;" onchange="updateFileList(this, 'image-names')">
                    <div id="image-names" class="file-names">No files selected</div>
                </div>
                <div class="form-group">
                    <label>PDF (optional)</label>
                    <label class="file-label" for="pdf"><i class="fas fa-file-pdf"></i> Select PDF</label>
                    <input type="file" name="pdf" id="pdf" accept=".pdf" style="display:none;" onchange="updateFileList(this, 'pdf-name')">
                    <div id="pdf-name" class="file-names">No files selected</div>
                </div>
                <div class="form-group" style="display:flex; gap:20px; flex-wrap:wrap;">
                    <label><input type="checkbox" name="for_sale" value="true" checked> For Sale</label>
                    <label><input type="checkbox" name="display_only" value="true"> Display Only</label>
                    <label><input type="checkbox" name="auction" value="true" id="auctionCheckbox"> Auction</label>
                </div>
                <div id="auction-settings"><label>Auction End Date & Time</label><input type="datetime-local" name="auction_end"></div>
                <div class="form-group"><label>Story (English)</label><textarea name="story_en" rows="2" placeholder="Story in English..."></textarea></div>
                <div class="form-group"><label>Story (Your Language)</label><textarea name="story_local" rows="2" placeholder="Story in your mother tongue..."></textarea></div>
                <input type="hidden" name="local_lang" value="en">
                <button type="submit" class="submit-btn">Add Item</button>
            </form>
            <div id="upload-message" style="text-align:center; margin-top:12px; font-weight:600;"></div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/products.js"></script>
    <script>
        if (!Auth.isLoggedIn()) { alert('Please login first.'); window.location.href = 'login.html'; }
        document.getElementById('auctionCheckbox').addEventListener('change', function() {
            document.getElementById('auction-settings').style.display = this.checked ? 'block' : 'none';
        });
        function updateFileList(input, displayId) {
            const display = document.getElementById(displayId);
            display.textContent = input.files.length ? Array.from(input.files).map(f => f.name).join(', ') : 'No files selected';
        }
        document.getElementById('product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('upload-message');
            msg.innerHTML = '<span style="color:var(--gold);">Uploading...</span>';
            const formData = new FormData(e.target);
            if (!formData.get('for_sale')) formData.set('for_sale', 'false');
            if (!formData.get('display_only')) formData.set('display_only', 'false');
            if (!formData.get('auction')) formData.set('auction', 'false');
            try {
                await Products.create(formData);
                msg.innerHTML = '<span style="color:green;">Item added successfully!</span>';
                e.target.reset();
                document.getElementById('image-names').textContent = 'No files selected';
                document.getElementById('pdf-name').textContent = 'No files selected';
                setTimeout(() => { window.location.href = 'index.html'; }, 1500);
            } catch (err) {
                msg.innerHTML = `<span style="color:red;">${err.message}</span>`;
            }
        });
    </script>
</body>
</html>
