<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>
    <header class="navbar">
        <div class="logo">
            <div class="logo-circle">AV</div>
            <div><h2>Aadim Vault</h2></div>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="market.html" class="active">Market</a>
            <a href="auctions.html">Auctions</a>
            <a href="stories.html">Stories</a>

        <h2>Marketplace</h2>

        <div class="cards-grid" style="margin-top: 30px;">
            <div class="product-card">
                <img src="images/aadim_vault.jpg" alt="Ancient Coin">

                <div class="card-content"><h3>Vintage Mask</h3><p>₹ 25,000</p></div>

            <div class="product-card">
                <img src="images/aadim_vault.jpg" alt="Old Manuscript">
                <div class="card-content"><h3>Old Manuscript</h3><p>₹ 30,000</p></div>
            </div>
            <div class="product-card">
                <img src="images/aadim_vault.jpg" alt="Brass Lamp">
                <div class="card-content"><h3>Brass Lamp</h3><p>₹ 8,000</p></div>
