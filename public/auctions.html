<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auctions | Aadim Vault</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <div class="logo-circle">AV</div>
            <div><h2>Aadim Vault</h2></div>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="market.html">Market</a>
            <a href="auctions.html" class="active">Auctions</a>
            <a href="stories.html">Stories</a>
        </nav>
    </header>

    <section class="section" style="max-width: 900px; margin: auto;">
        <h2>Live Auctions</h2>
        <p>Bid on rare collectibles. Auctions are time-limited and open to all registered members.</p>
        <div class="auction-item" style="margin-top: 20px;">
            <img src="images/aadim_vault.jpg" alt="Golden Necklace">
            <div>
                <h3>Golden Necklace</h3>
                <p>Current Bid: ₹ 75,000</p>
                <button class="primary-btn small">Bid Now</button>
            </div>
        </div>
        <div class="auction-item" style="margin-top: 20px;">
            <img src="images/aadim_vault.jpg" alt="Ancient Sword">
            <div>
                <h3>Ancient Sword</h3>
                <p>Current Bid: ₹ 1,20,000</p>
                <button class="primary-btn small">Bid Now</button>
            </div>
        </div>
    </section>
</body>
</html>
