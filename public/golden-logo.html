<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aadim Vault Golden Logo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at center, rgba(255,190,80,0.12), transparent 45%),
                  radial-gradient(circle at center, rgba(255,190,80,0.14), transparent 40%),
                  radial-gradient(circle at top, rgba(255,160,60,0.08), transparent 50%),
                  #040301;
      overflow: hidden;
      perspective: 1200px;
      font-family: 'Cinzel', serif;
      transition: background 0.3s;
    }

    .background-glow {
      position: absolute;
      width: 700px;
      height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,210,120,0.18), rgba(255,180,60,0.05), transparent 70%);
      filter: blur(60px);
      animation: pulse 6s ease-in-out infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.08); opacity: 1; }
      100% { transform: scale(1); opacity: 0.7; }
    }

    .logo-wrapper {
      position: relative;
      width: 520px;
      height: 520px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #4a2f12, #120b05 70%);
      border: 4px solid rgba(255,210,120,0.6);
      box-shadow: 0 0 20px rgba(255,200,100,0.3), 0 0 80px rgba(255,180,50,0.15), inset 0 0 40px rgba(255,220,150,0.08);
      overflow: hidden;
      animation: float 5s ease-in-out infinite;
      transform-style: preserve-3d;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    .outer-ring {
      position: absolute;
      width: 450px;
      height: 450px;
      border-radius: 50%;
      border: 2px solid rgba(255,220,150,0.35);
      box-shadow: 0 0 30px rgba(255,190,80,0.15);
    }

    .gear-layer {
      position: absolute;
      border-radius: 50%;
      border: 10px solid rgba(255,210,120,0.22);
      animation: gearRotate linear infinite;
      box-shadow: 0 0 30px rgba(255,190,80,0.08), inset 0 0 25px rgba(255,220,150,0.08);
    }

    .gear-layer::before {
      content: "";
      position: absolute;
      inset: -18px;
      border-radius: 50%;
      background: repeating-conic-gradient(from 0deg, rgba(255,220,150,0.9) 0deg 8deg, transparent 8deg 18deg);
      -webkit-mask: radial-gradient(circle, transparent 58%, black 59%);
      mask: radial-gradient(circle, transparent 58%, black 59%);
      opacity: 0.6;
    }

    .gear1 { width: 420px; height: 420px; animation-duration: 18s; }
    .gear2 { width: 300px; height: 300px; animation-duration: 10s; animation-direction: reverse; }
    .gear3 { width: 180px; height: 180px; animation-duration: 7s; }

    @keyframes gearRotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .ancient-layer {
      position: absolute;
      border-radius: 50%;
      border: 1px dashed rgba(255,220,150,0.25);
      box-shadow: inset 0 0 20px rgba(255,210,120,0.06), 0 0 20px rgba(255,180,80,0.08);
      animation: rotateLayer linear infinite;
    }

    .layer1 { width: 390px; height: 390px; animation-duration: 20s; }
    .layer2 { width: 330px; height: 330px; animation-duration: 14s; animation-direction: reverse; }
    .layer3 { width: 270px; height: 270px; animation-duration: 10s; }

    .glyph {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255,215,120,0.9);
      box-shadow: 0 0 12px rgba(255,210,120,0.8);
    }

    @keyframes rotateLayer {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .vault {
      position: relative;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle at top, #c38b2d, #6f4314 70%);
      border: 10px solid #d8a34c;
      box-shadow: inset 0 0 30px rgba(255,240,200,0.35), 0 0 40px rgba(255,180,60,0.35);
    }

    .vault-door {
      position: absolute;
      width: 190px;
      height: 190px;
      border-radius: 50%;
      top: 5px;
      left: 90px;
      transform: rotate(-22deg);
      transform-origin: left center;
      background: radial-gradient(circle at top, #f0bd63, #7a4917 75%);
      border: 8px solid #e5b561;
      box-shadow: 0 0 30px rgba(255,200,80,0.35), inset 0 0 20px rgba(255,255,255,0.15);
      animation: openDoor 5s ease-in-out infinite;
    }

    @keyframes openDoor {
      0% { transform: rotate(-22deg); }
      50% { transform: rotate(-35deg); }
      100% { transform: rotate(-22deg); }
    }

    .light {
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,245,210,1), rgba(255,220,130,0.8), rgba(255,180,60,0.2), transparent 70%);
      filter: blur(10px);
      animation: shine 3s ease-in-out infinite;
    }

    @keyframes shine {
      0% { opacity: 0.7; }
      50% { opacity: 1; }
      100% { opacity: 0.7; }
    }

    .vault-center {
      position: absolute;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      background: #5e340d;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: 4px solid #f1c26a;
      z-index: 10;
    }

    .line {
      position: absolute;
      width: 85px;
      height: 7px;
      background: #f2c773;
      top: 50%;
      left: 50%;
      transform-origin: center;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(255,220,120,0.6);
    }
    .line1 { transform: translate(-50%, -50%) rotate(0deg); }
    .line2 { transform: translate(-50%, -50%) rotate(60deg); }
    .line3 { transform: translate(-50%, -50%) rotate(120deg); }

    .orbit-text {
      position: absolute;
      width: 520px;
      height: 520px;
      animation: orbitSpin 18s linear infinite;
      pointer-events: none;
    }
    .orbit-text text {
      fill: #f6cf83;
      font-size: 24px;
      letter-spacing: 6px;
      font-weight: 700;
      text-transform: uppercase;
      filter: drop-shadow(0 0 8px rgba(255,220,120,0.7)) drop-shadow(0 0 25px rgba(255,180,80,0.25));
    }
    @keyframes orbitSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .mini-gears { position: absolute; width: 100%; height: 100%; }
    .mini {
      position: absolute;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 7px solid rgba(255,210,120,0.7);
      background: radial-gradient(circle, #5b340f, #1a0f07);
      box-shadow: 0 0 20px rgba(255,180,70,0.25), inset 0 0 18px rgba(255,220,140,0.08);
      animation: miniGearSpin linear infinite;
    }
    .mini::before {
      content: "";
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      background: repeating-conic-gradient(rgba(255,220,120,0.95) 0deg 10deg, transparent 10deg 20deg);
      -webkit-mask: radial-gradient(circle, transparent 56%, black 57%);
      mask: radial-gradient(circle, transparent 56%, black 57%);
    }
    .mini1 { top: 18%; left: 44%; animation-duration: 6s; }
    .mini2 { top: 40%; left: 12%; animation-duration: 9s; animation-direction: reverse; }
    .mini3 { top: 40%; right: 12%; animation-duration: 8s; }
    .mini4 { bottom: 16%; left: 28%; animation-duration: 7s; animation-direction: reverse; }
    .mini5 { bottom: 16%; right: 28%; animation-duration: 5s; }
    .mini6 { top: 70%; left: 45%; animation-duration: 10s; animation-direction: reverse; }

    @keyframes miniGearSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .particles span {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #ffd27d;
      box-shadow: 0 0 12px #ffd27d;
      animation: particleMove linear infinite;
    }
    @keyframes particleMove {
      from { transform: translateY(0px); opacity: 1; }
      to { transform: translateY(-250px); opacity: 0; }
    }
    .particles span:nth-child(1) { left: 48%; top: 58%; animation-duration: 4s; }
    .particles span:nth-child(2) { left: 53%; top: 62%; animation-duration: 6s; }
    .particles span:nth-child(3) { left: 50%; top: 55%; animation-duration: 5s; }
    .particles span:nth-child(4) { left: 46%; top: 60%; animation-duration: 7s; }
    .particles span:nth-child(5) { left: 55%; top: 58%; animation-duration: 5.5s; }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @media (max-width: 700px) {
      .logo-wrapper { width: 360px; height: 360px; }
      .outer-ring { width: 300px; height: 300px; }
      .vault { width: 150px; height: 150px; }
      .vault-door { width: 130px; height: 130px; left: 65px; }
    }
  </style>
</head>
<body>
  <div class="background-glow"></div>
  <div class="logo-wrapper">
    <div class="outer-ring"></div>
    <div class="outer-ring" style="width:480px;height:480px;opacity:0.35"></div>
    <div class="gear-layer gear1"></div>
    <div class="gear-layer gear2"></div>
    <div class="gear-layer gear3"></div>
    <div class="ancient-layer layer1">
      <div class="glyph" style="top:-6px;left:50%"></div>
      <div class="glyph" style="bottom:-6px;left:50%"></div>
      <div class="glyph" style="left:-6px;top:50%"></div>
      <div class="glyph" style="right:-6px;top:50%"></div>
    </div>
    <div class="ancient-layer layer2">
      <div class="glyph" style="top:20px;left:50%"></div>
      <div class="glyph" style="bottom:20px;left:50%"></div>
    </div>
    <div class="ancient-layer layer3"></div>
    <div class="vault">
      <div class="light"></div>
      <div class="vault-door"></div>
      <div class="vault-center"></div>
      <div class="line line1"></div>
      <div class="line line2"></div>
      <div class="line line3"></div>
    </div>
    <div style="position:absolute;width:100%;height:100%;border-radius:50%;background:conic-gradient(from 0deg,transparent,rgba(255,210,120,0.12),transparent);animation:spin 12s linear infinite;"></div>
    <svg width="0" height="0">
      <defs>
        <path id="circlePath" d="M 260,260 m -125,0 a 125,125 0 1,1 250,0 a 125,125 0 1,1 -250,0" />
      </defs>
    </svg>
    <div class="orbit-text">
      <svg viewBox="0 0 520 520">
        <text>
          <textPath href="#circlePath" startOffset="0%">
            ✦ AADIM VAULT ✦ AADIM VAULT ✦ AADIM VAULT ✦
          </textPath>
        </text>
      </svg>
    </div>
    <div class="mini-gears">
      <div class="mini mini1"></div>
      <div class="mini mini2"></div>
      <div class="mini mini3"></div>
      <div class="mini mini4"></div>
      <div class="mini mini5"></div>
      <div class="mini mini6"></div>
    </div>
    <div class="particles">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>
</body>
</html>
